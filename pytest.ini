[pytest]
testpaths = tests cdk/tests
markers =
    integration: tests that require deployed infrastructure
    slow: tests that take a long time to run
norecursedirs =
    .git
    .history
    .hypothesis
    .pytest_cache
    .venv
    __pycache__
    cdk.out
    cdk/.venv
    lambda/.hypothesis
    lambda/.pytest_cache
